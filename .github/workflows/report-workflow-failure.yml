name: Report workflow failure to project board

on:
  workflow_run:
    workflows: ["*"]
    types: [completed]

permissions: {}

jobs:
  report:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.NEXUS_PLM_PROJECT_TOKEN }}
        script: |
          const projectId     = 'PVT_kwDOD-RDF84BUbus';
          const statusField   = 'PVTSSF_lADOD-RDF84BUbuszhBj2nw';
          const failedActions = 'fd4dcc66';

          const run = context.payload.workflow_run;

          // Skip enforcement/policy workflows -- their failures are intentional
          const skipNames = [
            'Report workflow failure to project board',
            'Enforce PRs to main must come from next',
            'Enforce working branches must be created from next',
            'Add PR to project',
            'Auto PR next -> main',
            'Mark project item Done or Cancelled when PR closes',
          ];
          if (skipNames.includes(run.name)) return;
          if (run.path && run.path.includes('enforce')) return;

          const sha    = run.head_sha.substring(0, 7);
          const branch = run.head_branch;
          const prefix = `Action failed: ${run.name} on ${branch}`;
          const title  = `${prefix} (${sha})`;

          // Deduplicate: if an open issue exists for this workflow+branch, comment instead
          const sevenDaysAgo = new Date();
          sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

          const { data: existing } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            per_page: 50
          });
          const dupe = existing.find(i =>
            i.title.startsWith(prefix) && new Date(i.created_at) > sevenDaysAgo
          );

          if (dupe) {
            // Add a comment to the existing issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: dupe.number,
              body: `Still failing on \`${branch}\` â€” commit \`${sha}\`: ${run.head_commit?.message?.split('\n')[0] || ''}\n[View logs](${run.html_url})`
            });
            core.info(`Commented on existing issue #${dupe.number}`);
            return;
          }

          // Create new issue
          const body = [
            `Workflow **${run.name}** failed on branch \`${branch}\`.`,
            ``,
            `**Commit:** \`${sha}\` -- ${run.head_commit?.message?.split('\n')[0] || ''}`,
            `**Run:** [View logs](${run.html_url})`
          ].join('\n');

          const { data: issue } = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title,
            body
          });

          // Add to project board
          let itemId;
          try {
            const result = await github.graphql(
              `mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }`,
              { projectId, contentId: issue.node_id }
            );
            itemId = result.addProjectV2ItemById.item.id;
          } catch(e) {
            core.warning('Could not add issue to project: ' + e.message);
            return;
          }

          // Place in Failed Actions column
          try {
            await github.graphql(
              `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId,
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }`,
              { projectId, itemId, fieldId: statusField, optionId: failedActions }
            );
          } catch(e) {
            core.warning('Could not set Failed Actions column: ' + e.message);
          }