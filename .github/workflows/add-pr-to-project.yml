name: Add PR to project

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write
  issues: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.NEXUS_PLM_PROJECT_TOKEN }}
        script: |
          const projectId = 'PVT_kwDOD-RDF84BUbus';
          const pr     = context.payload.pull_request;
          const base   = pr.base.ref;
          const author = pr.user.login;
          const prefix = `PR to ${base}: `;

          if (!pr.title.startsWith('PR to ')) {
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              title: prefix + pr.title
            });
          }

          // Assign to PR author for feature->next PRs.
          // Auto next->main PRs (head === 'next') are assigned inside auto-pr-next-to-main.yml.
          if (author !== 'github-actions[bot]' && pr.head.ref !== 'next') {
            try {
              await github.rest.issues.checkUserCanBeAssigned({
                owner: context.repo.owner,
                repo: context.repo.repo,
                assignee: author
              });
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                assignees: [author]
              });
              core.info(`Assigned to ${author}`);
            } catch(e) {
              core.info(`${author} cannot be assigned to this repo: ${e.message}`);
            }
          }

          try {
            await github.graphql(
              `mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }`,
              { projectId, contentId: pr.node_id }
            );
          } catch(e) {
            core.warning('Could not add PR to project: ' + e.message);
          }