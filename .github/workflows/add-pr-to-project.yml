name: Add PR to project

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  pull-requests: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.NEXUS_PLM_PROJECT_TOKEN }}
        script: |
          const projectId = 'PVT_kwDOD-RDF84BUbus';
          const pr = context.payload.pull_request;
          const base = pr.base.ref;
          const prefix = `PR to ${base}: `;
          if (!pr.title.startsWith('PR to ')) {
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              title: prefix + pr.title
            });
          }
          try {
            await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {projectId: $projectId, contentId: $contentId}) {
                  item { id }
                }
              }
            `, { projectId, contentId: pr.node_id });
          } catch(e) {
            core.warning('Could not add PR to project: ' + e.message);
          }